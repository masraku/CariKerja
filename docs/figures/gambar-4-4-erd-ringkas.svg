    <text x="1390" y="358" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">PK id, FK recruiterId</text>
    <text x="1390" y="380" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">scheduledAt, duration</text>
