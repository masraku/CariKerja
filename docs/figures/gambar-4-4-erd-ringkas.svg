    <text x="1075" y="673" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">PK id, FK jobId</text>
    <text x="1075" y="695" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">FK jobseekerId</text>
    <text x="1075" y="717" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">coverLetter, resumeUrl</text>
    <text x="1075" y="739" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">status, appliedAt</text>
    <text x="1075" y="761" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">reviewedAt, recruiterNotes</text>
    <text x="1075" y="783" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">unique jobId + jobseekerId</text>
  </g>

