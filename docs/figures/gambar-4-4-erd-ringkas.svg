    <text x="730" y="913" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">PK id, FK recruiterId</text>
    <text x="730" y="935" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">FK companyId</text>
    <text x="730" y="957" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">status, documents, notes</text>
  </g>

