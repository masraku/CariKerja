<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Gambar 4.4 ERD Ringkas Prototype Sistem Rekrutmen Digital</title>
  <desc id="desc">ERD ringkas yang menggambarkan entitas utama dan relasi pada prototype sistem rekrutmen digital.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f2940" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52677a"/>
    </marker>
  </defs>

  <rect width="1600" height="1050" fill="url(#bg)"/>
  <text x="800" y="46" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#0f2940">ERD Ringkas Prototype Sistem Rekrutmen Digital</text>
  <text x="800" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#52677a">Relasi utama data pengguna, perusahaan, lowongan, lamaran, wawancara, kontrak, resign, berita, dan audit log.</text>

  <!-- Users and profiles -->
  <g filter="url(#shadow)">
    <rect x="80" y="145" width="210" height="150" rx="16" fill="#ffffff" stroke="#c8d7e3" stroke-width="2"/>
    <rect x="80" y="145" width="210" height="38" rx="16" fill="#03587f"/>
    <path d="M 80 165 L 290 165 L 290 183 L 80 183 Z" fill="#03587f"/>
    <text x="185" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ffffff">users</text>
    <text x="100" y="208" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">PK id</text>
    <text x="100" y="230" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">email, password</text>
    <text x="100" y="252" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">role, status</text>
    <text x="100" y="274" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">createdAt, updatedAt</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="105" width="230" height="190" rx="16" fill="#ffffff" stroke="#c8d7e3" stroke-width="2"/>
    <rect x="380" y="105" width="230" height="38" rx="16" fill="#0487bd"/>
    <path d="M 380 125 L 610 125 L 610 143 L 380 143 Z" fill="#0487bd"/>
    <text x="495" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ffffff">jobseekers</text>
    <text x="400" y="168" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">PK id, FK userId</text>
    <text x="400" y="190" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">firstName, lastName</text>
    <text x="400" y="212" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">phone, address, kecamatan</text>
    <text x="400" y="234" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">cvUrl, ktpUrl, ak1Url</text>
    <text x="400" y="256" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">profileCompleteness</text>
  </g>

  <g filter="url(#shadow)">
