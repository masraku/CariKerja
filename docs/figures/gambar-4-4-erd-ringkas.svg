  <text x="825" y="585" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">jobseeker 1:N applications</text>
  <line x1="1177" y1="530" x2="1177" y2="610" stroke="#52677a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1238" y="574" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">job 1:N</text>
  <line x1="1300" y1="365" x2="1370" y2="365" stroke="#52677a" stroke-width="3" marker-end="url(#arrow)"/>
