  <text x="1350" y="690" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">N:1</text>
  <line x1="1055" y1="725" x2="955" y2="705" stroke="#52677a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1005" y="702" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">1:1 resign</text>
  <line x1="832" y1="785" x2="832" y2="850" stroke="#52677a" stroke-width="3" marker-end="url(#arrow)" opacity="0.55"/>
  <line x1="955" y1="925" x2="1055" y2="930" stroke="#52677a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1005" y="917" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">1:N</text>
  <line x1="1177" y1="830" x2="1177" y2="870" stroke="#52677a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="495" y1="520" x2="710" y2="900" stroke="#52677a" stroke-width="3" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="832" y1="520" x2="832" y2="850" stroke="#52677a" stroke-width="3" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="185" y1="295" x2="185" y2="600" stroke="#52677a" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)" opacity="0.65"/>

  <rect x="560" y="930" width="520" height="70" rx="18" fill="#ffffff" stroke="#c8d7e3" stroke-width="2"/>
