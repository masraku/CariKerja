    <text x="400" y="423" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">PK id, FK userId</text>
    <text x="400" y="445" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">FK companyId</text>
    <text x="400" y="467" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">firstName, position</text>
    <text x="400" y="489" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">permission, isVerified</text>
  </g>

