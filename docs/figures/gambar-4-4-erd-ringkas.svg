  <text x="820" y="980" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">PK = Primary Key, FK = Foreign Key. ERD dibuat ringkas agar fokus pada relasi utama proses rekrutmen.</text>
