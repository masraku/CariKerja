    <text x="730" y="705" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">FK applicationId</text>
    <text x="730" y="727" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f2940">FK jobseekerId</text>
    <text x="730" y="749" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">reason, letterUrl, status</text>
