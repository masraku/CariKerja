<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Gambar 4.3 Alur Proses Recruiter dan Administrator</title>
  <desc id="desc">Diagram alur recruiter dan administrator pada prototype sistem rekrutmen digital, mencakup verifikasi perusahaan, validasi lowongan, pengelolaan pelamar, wawancara, dan kontrak.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f2940" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#03587f"/>
    </marker>
  </defs>

  <rect width="1280" height="900" fill="url(#bg)"/>
  <text x="640" y="46" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0f2940">Alur Proses Recruiter dan Administrator</text>
  <text x="640" y="76" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#52677a">Alur validasi perusahaan, pengajuan lowongan, seleksi pelamar, wawancara, dan kontrak pada prototype.</text>

  <rect x="70" y="120" width="1140" height="205" rx="22" fill="#ffffff" stroke="#c8d7e3" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="120" width="1140" height="44" rx="22" fill="#e8f7ff"/>
  <text x="105" y="149" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#03587f">Swimlane Recruiter</text>

  <rect x="110" y="205" width="150" height="70" rx="14" fill="#f2f8fc" stroke="#b9d5e7"/>
  <text x="185" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0f2940">Registrasi</text>
  <text x="185" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">akun recruiter</text>

  <rect x="315" y="205" width="150" height="70" rx="14" fill="#f2f8fc" stroke="#b9d5e7"/>
  <text x="390" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0f2940">Lengkapi</text>
  <text x="390" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">profil perusahaan</text>

  <rect x="520" y="205" width="150" height="70" rx="14" fill="#f2f8fc" stroke="#b9d5e7"/>
  <text x="595" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0f2940">Ajukan</text>
  <text x="595" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">lowongan kerja</text>

  <rect x="725" y="205" width="150" height="70" rx="14" fill="#f2f8fc" stroke="#b9d5e7"/>
  <text x="800" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0f2940">Kelola</text>
  <text x="800" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">pelamar</text>

  <rect x="930" y="205" width="150" height="70" rx="14" fill="#f2f8fc" stroke="#b9d5e7"/>
  <text x="1005" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0f2940">Wawancara</text>
  <text x="1005" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">dan kontrak</text>

  <line x1="260" y1="240" x2="315" y2="240" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="465" y1="240" x2="520" y2="240" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="670" y1="240" x2="725" y2="240" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="875" y1="240" x2="930" y2="240" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="70" y="375" width="1140" height="205" rx="22" fill="#ffffff" stroke="#c8d7e3" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="375" width="1140" height="44" rx="22" fill="#fff8e8"/>
  <text x="105" y="404" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#8a5a00">Swimlane Administrator</text>

  <rect x="215" y="458" width="185" height="76" rx="14" fill="#fffdf7" stroke="#e7c76f"/>
  <text x="307" y="486" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0f2940">Periksa Perusahaan</text>
  <text x="307" y="508" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">Verifikasi / tolak data</text>

  <rect x="520" y="458" width="185" height="76" rx="14" fill="#fffdf7" stroke="#e7c76f"/>
  <text x="612" y="486" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0f2940">Validasi Lowongan</text>
  <text x="612" y="508" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">Aktif / ditolak / tutup</text>

  <rect x="825" y="458" width="185" height="76" rx="14" fill="#fffdf7" stroke="#e7c76f"/>
  <text x="917" y="486" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0f2940">Monitoring Data</text>
  <text x="917" y="508" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">Dashboard dan audit log</text>

  <path d="M 390 275 C 390 350 307 360 307 458" fill="none" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 307 534 C 307 610 595 610 595 275" fill="none" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 595 275 C 595 350 612 360 612 458" fill="none" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 612 534 C 612 610 800 610 800 275" fill="none" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1005 275 C 1005 370 917 370 917 458" fill="none" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="70" y="630" width="1140" height="170" rx="22" fill="#ffffff" stroke="#c8d7e3" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="630" width="1140" height="44" rx="22" fill="#e9fbf1"/>
  <text x="105" y="659" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f7a45">Status dan Output Sistem</text>

  <rect x="125" y="708" width="170" height="48" rx="12" fill="#e9fbf1" stroke="#91d9b2"/>
  <text x="210" y="737" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#0f2940">Company VERIFIED</text>

  <rect x="345" y="708" width="170" height="48" rx="12" fill="#e9fbf1" stroke="#91d9b2"/>
  <text x="430" y="737" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#0f2940">Job ACTIVE</text>

  <rect x="565" y="708" width="170" height="48" rx="12" fill="#e9fbf1" stroke="#91d9b2"/>
  <text x="650" y="737" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#0f2940">Application Updated</text>

  <rect x="785" y="708" width="170" height="48" rx="12" fill="#e9fbf1" stroke="#91d9b2"/>
  <text x="870" y="737" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#0f2940">Interview Scheduled</text>

  <rect x="1005" y="708" width="170" height="48" rx="12" fill="#e9fbf1" stroke="#91d9b2"/>
  <text x="1090" y="737" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#0f2940">Contract Recorded</text>

  <line x1="307" y1="534" x2="210" y2="708" stroke="#03587f" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <line x1="612" y1="534" x2="430" y2="708" stroke="#03587f" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <line x1="800" y1="275" x2="650" y2="708" stroke="#03587f" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <line x1="1005" y1="275" x2="870" y2="708" stroke="#03587f" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <line x1="1005" y1="275" x2="1090" y2="708" stroke="#03587f" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>

  <text x="640" y="852" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7f90">Admin berperan sebagai pengendali validasi, sedangkan recruiter mengelola lowongan dan proses seleksi setelah perusahaan dinyatakan layak.</text>
</svg>
