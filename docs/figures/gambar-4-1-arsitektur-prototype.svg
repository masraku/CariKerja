<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Gambar 4.1 Arsitektur Umum Prototype Sistem Rekrutmen Digital</title>
  <desc id="desc">Diagram arsitektur prototype sistem rekrutmen digital berbasis Next.js, React, API Routes, Prisma ORM, PostgreSQL, storage, email, dan lapisan keamanan.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6fb"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03587f"/>
      <stop offset="100%" stop-color="#0487bd"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f7ff"/>
      <stop offset="100%" stop-color="#cbeeff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9fbf1"/>
      <stop offset="100%" stop-color="#c8f2dc"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#ffebba"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f2940" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#03587f"/>
    </marker>
  </defs>

  <rect width="1280" height="820" fill="url(#bg)"/>

  <text x="640" y="46" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0f2940">Arsitektur Umum Prototype Sistem Rekrutmen Digital</text>
  <text x="640" y="76" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#52677a">Aktor pengguna mengakses aplikasi web, diproses oleh Next.js dan API, lalu data dikelola melalui Prisma dan PostgreSQL.</text>

  <!-- Client Layer -->
  <rect x="55" y="130" width="250" height="430" rx="24" fill="#ffffff" stroke="#c8d7e3" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f2940">Client / Browser</text>
  <text x="180" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#52677a">Pengguna mengakses web app</text>

  <rect x="82" y="220" width="196" height="78" rx="16" fill="url(#cyan)" stroke="#8bcce9"/>
  <circle cx="118" cy="259" r="18" fill="#03587f"/>
  <text x="118" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">JS</text>
  <text x="150" y="252" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2940">Pencari Kerja</text>
  <text x="150" y="274" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Profil, lamaran, interview</text>

  <rect x="82" y="328" width="196" height="78" rx="16" fill="url(#cyan)" stroke="#8bcce9"/>
  <circle cx="118" cy="367" r="18" fill="#03587f"/>
  <text x="118" y="373" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">R</text>
  <text x="150" y="360" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2940">Recruiter</text>
  <text x="150" y="382" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Lowongan dan pelamar</text>

  <rect x="82" y="436" width="196" height="78" rx="16" fill="url(#cyan)" stroke="#8bcce9"/>
  <circle cx="118" cy="475" r="18" fill="#03587f"/>
  <text x="118" y="481" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">A</text>
  <text x="150" y="468" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2940">Administrator</text>
  <text x="150" y="490" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Validasi dan monitoring</text>

  <!-- Application Layer -->
  <rect x="380" y="115" width="430" height="530" rx="28" fill="#ffffff" stroke="#b5cbd9" stroke-width="2" filter="url(#shadow)"/>
  <rect x="380" y="115" width="430" height="70" rx="28" fill="url(#blue)"/>
  <path d="M 380 157 L 810 157 L 810 185 L 380 185 Z" fill="url(#blue)"/>
  <text x="595" y="151" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#ffffff">Next.js Web Application</text>
  <text x="595" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#dff5ff">App Router, React UI, Server Process, API Routes</text>

  <rect x="420" y="220" width="160" height="92" rx="18" fill="#f2f8fc" stroke="#c2d9e8"/>
  <text x="500" y="252" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2940">React Pages</text>
  <text x="500" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Landing page</text>
  <text x="500" y="294" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Dashboard dan form</text>

  <rect x="610" y="220" width="160" height="92" rx="18" fill="#f2f8fc" stroke="#c2d9e8"/>
  <text x="690" y="252" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2940">API Routes</text>
  <text x="690" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Jobs, profile</text>
  <text x="690" y="294" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Lamaran, admin</text>

  <rect x="420" y="350" width="350" height="92" rx="18" fill="url(#amber)" stroke="#e7c76f"/>
  <text x="595" y="382" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2940">Lapisan Keamanan dan Validasi</text>
  <text x="595" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">JWT cookie, role-based access, CSRF, rate limit</text>
  <text x="595" y="425" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Zod validation, password hashing, sanitasi input</text>

  <rect x="420" y="480" width="350" height="92" rx="18" fill="url(#green)" stroke="#91d9b2"/>
  <text x="595" y="512" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2940">Modul Bisnis Rekrutmen</text>
  <text x="595" y="536" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Profil, perusahaan, lowongan, lamaran</text>
  <text x="595" y="555" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Wawancara, kontrak, resign, berita, audit log</text>

  <!-- Data Layer -->
  <rect x="895" y="130" width="330" height="430" rx="24" fill="#ffffff" stroke="#c8d7e3" stroke-width="2" filter="url(#shadow)"/>
  <text x="1060" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f2940">Data dan Layanan Pendukung</text>
  <text x="1060" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#52677a">Penyimpanan, media, dan notifikasi</text>

  <rect x="930" y="225" width="260" height="86" rx="18" fill="url(#green)" stroke="#91d9b2"/>
  <text x="1060" y="257" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2940">Prisma ORM</text>
  <text x="1060" y="281" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Model dan query basis data</text>

  <rect x="930" y="340" width="260" height="100" rx="18" fill="#f2f8fc" stroke="#c2d9e8"/>
  <text x="1060" y="373" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2940">PostgreSQL Database</text>
  <text x="1060" y="397" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Users, companies, jobs</text>
  <text x="1060" y="416" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52677a">Applications, interviews, contracts</text>

  <rect x="930" y="470" width="118" height="70" rx="16" fill="#fff8e8" stroke="#e7c76f"/>
  <text x="989" y="500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0f2940">File Upload</text>
  <text x="989" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">CV, KTP, AK1</text>

  <rect x="1072" y="470" width="118" height="70" rx="16" fill="#fff8e8" stroke="#e7c76f"/>
  <text x="1131" y="500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0f2940">Email</text>
  <text x="1131" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#52677a">Notifikasi opsional</text>

  <!-- Data modules strip -->
  <rect x="120" y="690" width="1040" height="70" rx="22" fill="#ffffff" stroke="#c8d7e3" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="716" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2940">Entitas Data Utama</text>
  <text x="640" y="742" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#52677a">users, jobseekers, recruiters, companies, jobs, applications, interviews, contract_registrations, contract_workers, resignations, news, audit_logs</text>

  <!-- Arrows -->
  <line x1="305" y1="345" x2="380" y2="345" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="342" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#03587f">HTTP request</text>

  <line x1="810" y1="345" x2="895" y2="345" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="852" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#03587f">Data access</text>

  <line x1="1060" y1="311" x2="1060" y2="340" stroke="#03587f" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="770" y1="520" x2="930" y2="500" stroke="#03587f" stroke-width="3" marker-end="url(#arrow)" opacity="0.85"/>
  <line x1="770" y1="540" x2="1072" y2="510" stroke="#03587f" stroke-width="3" marker-end="url(#arrow)" opacity="0.85"/>
  <line x1="1060" y1="440" x2="1060" y2="690" stroke="#03587f" stroke-width="3" stroke-dasharray="8 8" opacity="0.6"/>

  <!-- Footer note -->
  <text x="640" y="792" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7f90">Diagram ini menunjukkan arsitektur prototype, bukan klaim integrasi resmi dengan sistem operasional Disnaker.</text>
</svg>
